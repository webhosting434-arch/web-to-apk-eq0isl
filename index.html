<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menuju Halaman Aman...</title>
    
    <script src="https://pl28798134.effectivecpmnetwork.com/bc/5c/78/bc5c78f9b89f814cd957e1ea17625333.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: radial-gradient(circle at top right, #1e1b4b, #090514); }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .pulse-loader { animation: pulse-soft 2s infinite; }
    </style>
</head>
<body class="min-h-screen text-slate-100 flex flex-col justify-between overflow-x-hidden">
    <div class="w-full max-w-md mx-auto px-4 py-12 flex-grow flex flex-col justify-center items-center z-10">
        <div class="w-full glass-card rounded-3xl p-8 text-center shadow-2xl">
            <div class="w-16 h-16 bg-indigo-500/10 rounded-2xl flex items-center justify-center mx-auto mb-6 border border-indigo-500/20">
                <svg class="w-8 h-8 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h2 class="text-2xl font-bold mb-2">Tautan Siap Dibuka</h2>
            <p class="text-slate-400 text-sm mb-8 px-4">Klik tombol di bawah untuk memproses dan mengarah ke halaman tujuan resmi.</p>
            <button id="start-btn" onclick="startCountdown()" class="w-full py-4 bg-emerald-600 hover:bg-emerald-500 text-white font-semibold rounded-2xl shadow-lg shadow-emerald-600/20 transition-all duration-300 transform active:scale-[0.99]">Start Destination</button>
            <div id="countdown-display" class="hidden mt-4">
                <div class="text-sm text-slate-400 mb-1 pulse-loader">Megarahkan secara aman...</div>
                <div class="text-4xl font-extrabold text-indigo-400 tracking-wider" id="timer-number">5</div>
                <div class="w-full bg-slate-900 h-1.5 rounded-full mt-3 overflow-hidden border border-slate-800">
                    <div id="progress-bar" class="bg-indigo-500 h-full w-0 transition-all duration-1000 ease-linear"></div>
                </div>
            </div>
        </div>
    </div>
    <script>
        function startCountdown() {
            document.getElementById('start-btn').classList.add('hidden');
            document.getElementById('countdown-display').classList.remove('hidden');
            let timeLeft = 5;
            setTimeout(() => { document.getElementById('progress-bar').style.width = '100%'; }, 50);
            const interval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-number').innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(interval);
                    window.location.replace("https://appsgeyser.com/create-app/?url=https%3A%2F%2Fwebhosting434-arch.github.io%2Fhtml-hcgjjg%2F");
                }
            }, 1000);
        }
    </script>
</body>
</html>
